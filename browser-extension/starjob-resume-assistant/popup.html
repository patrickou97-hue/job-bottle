<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>拾星网申助手</title>
    <link rel="stylesheet" href="popup.css?v=017-popup-width" />
  </head>
  <body>
    <main class="shell">
      <header class="brand-row">
        <img src="assets/wordmark.png" alt="拾星" class="brand-wordmark" />
        <div class="brand-copy">
          <div class="brand-title-line">
            <h1>网申助手</h1>
            <span class="brand-badge">安全填写</span>
          </div>
          <p>把拾星简历填进当前页面</p>
        </div>
      </header>

      <section id="emptyState" class="state-panel" hidden>
        <h2>先同步一份拾星简历</h2>
        <p>安装后前往拾星助手页，登录并选择“同步到扩展”。</p>
        <button id="openSyncFromEmpty" class="button button-primary" type="button">前往同步</button>
      </section>

      <section id="readyState" class="control-stack" hidden>
        <label class="field-group" for="resumeSelect">
          <span class="field-label-line"><span>使用简历</span><span aria-hidden="true">已同步版本</span></span>
          <select id="resumeSelect"></select>
        </label>

        <fieldset class="mode-group">
          <legend>填写方式</legend>
          <label>
            <input type="radio" name="fillMode" value="merge" checked />
            <span>只填空白项</span>
          </label>
          <label>
            <input type="radio" name="fillMode" value="overwrite" />
            <span>覆盖已有内容</span>
          </label>
        </fieldset>

        <button id="fillButton" class="button button-primary" type="button">一键填写当前页面</button>
        <div class="meta-row"><span class="meta-dot" aria-hidden="true"></span><p id="syncMeta" class="meta"></p></div>
      </section>

      <section id="resultPanel" class="result-panel" aria-live="polite" hidden>
        <span class="result-kicker">填写结果</span>
        <div class="result-copy">
          <strong id="resultTitle"></strong>
          <p id="resultText"></p>
        </div>
      </section>

      <section id="progressPanel" class="progress-panel" aria-live="polite" hidden>
        <div class="progress-heading"><strong>本次处理</strong><span>按页面顺序执行</span></div>
        <div class="progress-row" data-step="extract"><span class="progress-dot"></span><div><strong>页面字段提取</strong><p>等待开始</p></div></div>
        <div class="progress-row" data-step="match"><span class="progress-dot"></span><div><strong>智能分析匹配</strong><p>等待字段清单</p></div></div>
        <div class="progress-row" data-step="fill"><span class="progress-dot"></span><div><strong>开始逐项填写</strong><p>等待匹配结果</p></div></div>
        <div class="progress-row" data-step="summary"><span class="progress-dot"></span><div><strong>未填项整理</strong><p>等待填写完成</p></div></div>
      </section>

      <footer class="footer-actions">
        <div class="footer-main-actions">
          <button id="openSync" class="text-button" type="button">同步简历</button>
          <span class="footer-separator" aria-hidden="true"></span>
          <button id="openGuide" class="text-button" type="button">使用教程</button>
        </div>
        <button id="clearData" class="text-button text-button-danger" type="button">清除本地数据</button>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
